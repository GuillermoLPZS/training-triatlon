name: Insertar sesión en Supabase

on:
  push:
    paths:
      - 'sesiones/nueva_sesion.json'

jobs:
  insert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Insertar en Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          SESSION=$(cat sesiones/nueva_sesion.json)
          echo "Insertando sesión..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$SUPABASE_URL/rest/v1/sesiones" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "$SESSION")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP: $HTTP_CODE"
          echo "Respuesta: $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Sesión insertada correctamente"
          else
            echo "❌ Error al insertar — código $HTTP_CODE"
            exit 1
          fi

      - name: Archivar sesión
        run: |
          FECHA=$(python3 -c "import json; d=json.load(open('sesiones/nueva_sesion.json')); print(d['fecha'])")
          CODIGO=$(python3 -c "import json; d=json.load(open('sesiones/nueva_sesion.json')); print(d['codigo'])")
          mkdir -p sesiones/historial
          cp sesiones/nueva_sesion.json "sesiones/historial/${FECHA}_${CODIGO}.json"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sesiones/historial/
          git diff --staged --quiet || git commit -m "📦 Archivada ${CODIGO} (${FECHA})"
          git push
