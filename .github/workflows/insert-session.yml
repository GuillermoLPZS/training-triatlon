name: Insertar sesion en Supabase

on:
  push:
    paths:
      - 'sesiones/nueva_sesion.json'

jobs:
  insert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar payload
        run: |
          TABLE=$(python3 scripts/router.py)
          echo "TABLA=$TABLE" >> $GITHUB_ENV
          echo "=== Tabla: $TABLE ==="
          echo "=== Payload ==="
          cat /tmp/payload.json

      - name: Insertar en Supabase
        run: |
          echo "=== Enviando a ${SUPABASE_URL}/rest/v1/${TABLA} ==="
          curl -v -s -o /tmp/response.json \
            -X POST "${SUPABASE_URL}/rest/v1/${TABLA}" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d @/tmp/payload.json
          echo ""
          echo "=== Respuesta Supabase ==="
          cat /tmp/response.json

      - name: Archivar sesion
        run: |
          FECHA=$(python3 -c "import json; print(json.load(open('sesiones/nueva_sesion.json'))['fecha'])")
          TIPO=$(python3 -c "import json; print(json.load(open('sesiones/nueva_sesion.json')).get('tipo','otros').lower())")
          mkdir -p sesiones/historial
          cp sesiones/nueva_sesion.json "sesiones/historial/${FECHA}_${TIPO}.json"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sesiones/historial/
          git diff --staged --quiet || git commit -m "Archivada ${TIPO} (${FECHA})"
          git push
