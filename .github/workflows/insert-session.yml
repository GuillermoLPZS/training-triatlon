
name: Insertar sesion en Supabase

on:
  push:
    paths:
      - 'sesiones/nueva_sesion.json'

jobs:
  insert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Preparar e insertar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Leer tipo de sesion
          TIPO=$(python3 -c "import json; d=json.load(open('sesiones/nueva_sesion.json')); print(d.get('tipo','').lower())")
          echo "Tipo de sesion: $TIPO"

          # Routing a tabla correcta
          case "$TIPO" in
            carrera) TABLE="carrera" ;;
            bici)    TABLE="bici" ;;
            natacion) TABLE="natacion" ;;
            *)       TABLE="otros" ;;
          esac
          echo "Tabla destino: $TABLE"

          # Extraer campos segun tabla y construir JSON limpio
          python3 << EOF
import json, sys

with open('sesiones/nueva_sesion.json') as f:
    d = json.load(f)

tipo = d.get('tipo', '').lower()

if tipo == 'carrera':
    out = {k: d[k] for k in [
        'fecha','objetivo','fatiga_previa','duracion_min','distancia_km',
        'ritmo_media','ritmo_optimo','fc_media','fc_max',
        'potencia_media','potencia_max','cadencia',
        'oscilacion_cm','contacto_ms','ratio_vertical','stamina_final',
        'te_aerobico','te_anaerobico','notas'
    ] if k in d}

elif tipo == 'bici':
    out = {k: d[k] for k in [
        'fecha','objetivo','fatiga_previa','duracion_min','distancia_km',
        'velocidad_media','velocidad_max','fc_media','fc_max',
        'potencia_media','potencia_max','cadencia_rpm','desnivel_m','tae',
        'te_aerobico','te_anaerobico','notas'
    ] if k in d}

elif tipo == 'natacion':
    out = {k: d[k] for k in [
        'fecha','objetivo','fatiga_previa','duracion_min','distancia_m',
        'ritmo_media','ritmo_optimo','fc_media','fc_max',
        'brazadas_largo','estil','te_aerobico','te_anaerobico','notas'
    ] if k in d}

else:
    out = {k: d[k] for k in [
        'fecha','deporte','objetivo','duracion_min','fc_media','fc_max',
        'calorias','te_aerobico','te_anaerobico',
        'carga_ajenada','body_battery','notas'
    ] if k in d}

with open('/tmp/payload.json', 'w') as f:
    json.dump(out, f)

print("Payload generado:", json.dumps(out, indent=2))
EOF

          # Insert en Supabase
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "$SUPABASE_URL/rest/v1/$TABLE" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d @/tmp/payload.json)

          echo "HTTP: $HTTP_CODE"
          cat /tmp/response.json

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "OK insertado en $TABLE"
          else
            echo "ERROR $HTTP_CODE"
            exit 1
          fi

      - name: Archivar sesion
        run: |
          FECHA=$(python3 -c "import json; d=json.load(open('sesiones/nueva_sesion.json')); print(d['fecha'])")
          TIPO=$(python3 -c "import json; d=json.load(open('sesiones/nueva_sesion.json')); print(d.get('tipo','').lower())")
          mkdir -p sesiones/historial
          cp sesiones/nueva_sesion.json "sesiones/historial/${FECHA}_${TIPO}.json"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sesiones/historial/
          git diff --staged --quiet || git commit -m "Archivada ${TIPO} (${FECHA})"
          git push
