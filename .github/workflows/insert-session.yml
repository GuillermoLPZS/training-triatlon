name: Insertar sesion en Supabase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  insert:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '🏃') || contains(github.event.head_commit.message, '🏊') || contains(github.event.head_commit.message, '🚴') || contains(github.event.head_commit.message, '⚡') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar payload
        run: |
          TABLE=$(python3 scripts/router.py)
          echo "TABLA=$TABLE" >> $GITHUB_ENV

      - name: Insertar en Supabase
        run: |
          HTTP_CODE=$(curl -s -o /tmp/sb_response.json -w "%{http_code}" \
            -X POST "${SUPABASE_URL}/rest/v1/${TABLA}" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d @/tmp/payload.json)
          # Guardar resultado para poder leerlo
          echo "{\"http_code\": $HTTP_CODE, \"response\": $(cat /tmp/sb_response.json)}" > sesiones/ultimo_resultado.json
          cat sesiones/ultimo_resultado.json
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "INSERT OK"
          else
            echo "INSERT FAILED: $HTTP_CODE"
            exit 1
          fi

      - name: Archivar sesion
        if: always()
        run: |
          FECHA=$(python3 -c "import json; print(json.load(open('sesiones/nueva_sesion.json'))['fecha'])")
          TIPO=$(python3 -c "import json; print(json.load(open('sesiones/nueva_sesion.json')).get('tipo','otros').lower())")
          mkdir -p sesiones/historial
          cp sesiones/nueva_sesion.json "sesiones/historial/${FECHA}_${TIPO}.json"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sesiones/historial/ sesiones/ultimo_resultado.json
          git diff --staged --quiet || git commit -m "debug: resultado Supabase ${FECHA}"
          git push
